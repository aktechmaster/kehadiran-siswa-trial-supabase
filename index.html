<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurnal Kehadiran Kelas</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-4 md:p-6">
    <div class="max-w-4xl mx-auto bg-white rounded-lg shadow-lg p-6">
        <h1 class="text-2xl font-bold text-center text-blue-700 mb-6">📋 Jurnal Kehadiran Siswa</h1>

        
        <!-- Form Pilihan -->
        <div class="grid md:grid-cols-2 gap-4 mb-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Tanggal</label>
                <input type="date" id="tanggal" class="w-full border rounded p-2" required>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Pilih Kelas</label>
                <select id="kelas" class="w-full border rounded p-2" required>
                    <option value="">-- Pilih Kelas --</option>
                </select>
            </div>
        </div>

        <!-- Tombol Muat Siswa -->
        <button id="muatSiswa" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded mb-6">
            Tampilkan Daftar Siswa
        </button>

        <!-- Tabel Kehadiran -->
        <div id="areaTabel" class="hidden">
            <h2 class="text-xl font-semibold mb-4 text-gray-800">Daftar Siswa & Kehadiran</h2>
            <div class="overflow-x-auto">
                <table class="w-full border-collapse border border-gray-300">
                    <thead>
                        <tr class="bg-gray-200">
                            <th class="border p-2 text-left">No</th>
                            <th class="border p-2 text-left">Nama Siswa</th>
                            <th class="border p-2 text-center">Status</th>
                        </tr>
                    </thead>
                    <tbody id="daftarSiswa"></tbody>
                </table>
            </div>

            <button id="simpanData" class="w-full bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-4 rounded mt-6">
                💾 Simpan Kehadiran
            </button>
            <p id="pesan" class="mt-4 text-center font-medium"></p>
        </div>
    </div>

    <script>
        // --------------------------
        // KONEKSI KE SUPABASE
        // --------------------------
        const SUPABASE_URL = "https://vbqihpwsneymfrjzlkrw.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_lIrrMLTWNuQ_g0t0BXogpQ_6x5Vt3lh";
        const supabase = supabaseJs.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --------------------------
        // AMBIL DAFTAR KELAS DARI DATA SISWA
        // --------------------------
        async function ambilDaftarKelas() {
            const { data, error } = await supabase
                .from("Data Siswa 2026/2027")
                .select("KELAS")
                .neq("KELAS", null)
                .order("KELAS")
                .limit(100);

            if (error) return console.error("Gagal ambil kelas:", error);
            
            const unik = [...new Set(data.map(item => item.KELAS))];
            const pilih = document.getElementById("kelas");
            unik.forEach(kelas => {
                const opsi = document.createElement("option");
                opsi.value = kelas;
                opsi.textContent = kelas;
                pilih.appendChild(opsi);
            });
        }

        // --------------------------
        // TAMPILKAN DAFTAR SISWA BERDASARKAN KELAS
        // --------------------------
        document.getElementById("muatSiswa").addEventListener("click", async () => {
            const kelas = document.getElementById("kelas").value;
            const tanggal = document.getElementById("tanggal").value;

            if (!tanggal || !kelas) {
                alert("Isi tanggal dan pilih kelas dulu!");
                return;
            }

            const { data, error } = await supabase
                .from("Data Siswa 2026/2027")
                .select("NAMA SISWA")
                .eq("KELAS", kelas)
                .order("NAMA SISWA");

            if (error) return alert("Gagal memuat siswa: " + error.message);
            if (!data.length) return alert("Tidak ada siswa di kelas ini!");

            const tabel = document.getElementById("daftarSiswa");
            tabel.innerHTML = "";

            data.forEach((siswa, i) => {
                const baris = document.createElement("tr");
                baris.className = "hover:bg-gray-50";
                baris.innerHTML = `
                    <td class="border p-2 text-center">${i + 1}</td>
                    <td class="border p-2">${siswa["NAMA SISWA"]}</td>
                    <td class="border p-2 text-center">
                        <div class="flex justify-center gap-2">
                            <label class="cursor-pointer px-2 py-1 rounded bg-green-100 hover:bg-green-200">
                                <input type="radio" name="status_${i}" value="H" checked> H
                            </label>
                            <label class="cursor-pointer px-2 py-1 rounded bg-yellow-100 hover:bg-yellow-200">
                                <input type="radio" name="status_${i}" value="S"> S
                            </label>
                            <label class="cursor-pointer px-2 py-1 rounded bg-blue-100 hover:bg-blue-200">
                                <input type="radio" name="status_${i}" value="I"> I
                            </label>
                            <label class="cursor-pointer px-2 py-1 rounded bg-red-100 hover:bg-red-200">
                                <input type="radio" name="status_${i}" value="A"> A
                            </label>
                            <input type="hidden" class="nama_siswa" value="${siswa["NAMA SISWA"]}">
                        </div>
                    </td>
                `;
                tabel.appendChild(baris);
            });

            document.getElementById("areaTabel").classList.remove("hidden");
        });

        // --------------------------
        // SIMPAN DATA KE SUPABASE
        // --------------------------
        document.getElementById("simpanData").addEventListener("click", async () => {
            const tanggal = document.getElementById("tanggal").value;
            const kelas = document.getElementById("kelas").value;
            const pesan = document.getElementById("pesan");
            pesan.textContent = "";

            const baris = document.querySelectorAll("#daftarSiswa tr");
            const dataMasuk = [];

            baris.forEach(brs => {
                const nama = brs.querySelector(".nama_siswa").value;
                const status = brs.querySelector("input[type=radio]:checked").value;
                dataMasuk.push({
                    tanggal: tanggal,
                    kelas: kelas,
                    nama_siswa: nama,
                    status: status,
                    email_pengisi: "guru@sekolah.sch.id" // bisa diganti nanti
                });
            });

            const { error } = await supabase
                .from("presensi_mentah")
                .insert(dataMasuk);

            if (error) {
                pesan.textContent = "❌ Gagal disimpan: " + error.message;
                pesan.className = "mt-4 text-center font-medium text-red-600";
            } else {
                pesan.textContent = "✅ Berhasil disimpan! Rekap otomatis terbarui.";
                pesan.className = "mt-4 text-center font-medium text-green-600";
            }
        });

        // Jalankan saat halaman dibuka
        window.onload = ambilDaftarKelas;
    </script>
</body>
</html>
